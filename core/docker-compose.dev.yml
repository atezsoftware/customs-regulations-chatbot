services:
  core-api:
    container_name: customs-core-api-dev
    ports:
      - "127.0.0.1:${CORE_PORT:-8000}:8000"
    volumes:
      - ./shared/src:/app/shared/src
      - ./api/src:/app/api/src
    command: uv run --package fs-explorer-api uvicorn fs_explorer_api.server:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
