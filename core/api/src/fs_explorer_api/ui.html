<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FsExplorer</title>
    <style>
        :root {
            --bg: #f7f8fa;
            --surface: #ffffff;
            --surface-2: #eef1f5;
            --ink: #14171f;
            --muted: #687080;
            --soft: #8c95a5;
            --line: #dce1e8;
            --line-strong: #c3cad6;
            --accent: #256f63;
            --accent-2: #265f9f;
            --danger: #b44335;
            --shadow: 0 18px 50px rgba(24, 32, 45, 0.08);
            --radius: 8px;
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--ink);
            font-family: var(--sans);
            font-size: 14px;
            line-height: 1.5;
        }

        button, input, textarea {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .app {
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr auto;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(247, 248, 250, 0.94);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--line);
        }

        .topbar-inner {
            max-width: 1180px;
            margin: 0 auto;
            padding: 14px 20px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .brand-mark {
            width: 30px;
            height: 30px;
            border-radius: 7px;
            background: var(--ink);
            color: white;
            display: grid;
            place-items: center;
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 700;
        }

        .brand-text {
            display: grid;
            gap: 1px;
        }

        .brand-title {
            font-weight: 700;
            letter-spacing: 0;
        }

        .brand-subtitle {
            color: var(--muted);
            font-size: 12px;
        }

        .folder-control {
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--surface);
        }

        .folder-path {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            border: 1px solid var(--line-strong);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--ink);
            padding: 8px 11px;
            min-height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            font-weight: 650;
            font-size: 13px;
        }

        .btn.primary {
            background: var(--ink);
            border-color: var(--ink);
            color: white;
        }

        .btn.subtle {
            background: transparent;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-height: 34px;
            padding: 7px 10px;
            border-radius: var(--radius);
            border: 1px solid var(--line);
            background: var(--surface);
            color: var(--muted);
            font-size: 12px;
            font-weight: 650;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--soft);
        }

        .dot.on {
            background: var(--accent);
        }

        .dot.busy {
            background: var(--accent-2);
            animation: pulse 1.2s infinite;
        }

        .dot.error {
            background: var(--danger);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.35); opacity: 0.55; }
        }

        .mode-group {
            display: inline-flex;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--surface);
            overflow: hidden;
        }

        .mode {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 34px;
            padding: 7px 10px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 650;
            border-right: 1px solid var(--line);
        }

        .mode:last-child {
            border-right: 0;
        }

        .mode input {
            accent-color: var(--accent);
        }

        .mode.disabled {
            opacity: 0.45;
        }

        .main {
            max-width: 920px;
            width: 100%;
            margin: 0 auto;
            padding: 28px 20px 150px;
        }

        .chat {
            display: grid;
            gap: 18px;
        }

        .welcome {
            padding: 24px 0 8px;
            display: grid;
            gap: 8px;
        }

        .welcome h1 {
            margin: 0;
            font-size: 30px;
            line-height: 1.18;
            letter-spacing: 0;
        }

        .welcome p {
            margin: 0;
            max-width: 680px;
            color: var(--muted);
            font-size: 15px;
        }

        .message {
            display: grid;
            grid-template-columns: 34px minmax(0, 1fr);
            gap: 12px;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            font-weight: 750;
            font-size: 12px;
            background: var(--surface-2);
            color: var(--ink);
            border: 1px solid var(--line);
        }

        .message.user .avatar {
            background: var(--ink);
            border-color: var(--ink);
            color: white;
        }

        .bubble {
            min-width: 0;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: 0 1px 0 rgba(20, 23, 31, 0.03);
            overflow: hidden;
        }

        .message.user .bubble {
            background: #f1f4f8;
        }

        .bubble-body {
            padding: 15px 16px;
        }

        .text {
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        .assistant-shell {
            display: grid;
            gap: 0;
        }

        .live-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border-bottom: 1px solid var(--line);
            color: var(--muted);
            background: #fbfcfd;
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid var(--line-strong);
            border-top-color: var(--accent-2);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex: 0 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .live-copy {
            min-width: 0;
            display: grid;
            gap: 1px;
        }

        .live-label {
            color: var(--ink);
            font-weight: 700;
            font-size: 13px;
        }

        .live-detail {
            color: var(--muted);
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .activity {
            padding: 10px 14px;
            border-bottom: 1px solid var(--line);
            display: none;
        }

        .activity.has-items {
            display: grid;
            gap: 8px;
        }

        .activity-item {
            display: grid;
            grid-template-columns: 22px minmax(0, 1fr);
            gap: 8px;
            color: var(--muted);
            font-size: 12px;
        }

        .activity-step {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: 1px solid var(--line);
            display: grid;
            place-items: center;
            color: var(--soft);
            font-family: var(--mono);
            font-size: 10px;
            background: var(--surface);
        }

        .activity-main {
            min-width: 0;
        }

        .activity-title {
            color: var(--ink);
            font-weight: 700;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .activity-reason {
            margin-top: 2px;
            overflow-wrap: anywhere;
        }

        .answer {
            padding: 16px;
            min-height: 54px;
            overflow-wrap: anywhere;
            font-size: 15px;
        }

        .answer:empty::before {
            content: "Waiting for answer...";
            color: var(--soft);
        }

        .cursor::after {
            content: "";
            display: inline-block;
            width: 7px;
            height: 1.05em;
            margin-left: 2px;
            vertical-align: -0.18em;
            background: var(--accent-2);
            animation: blink 1s steps(1) infinite;
        }

        .answer h1, .answer h2, .answer h3 {
            margin: 0 0 10px;
            line-height: 1.25;
            letter-spacing: 0;
        }

        .answer h1 {
            font-size: 22px;
        }

        .answer h2 {
            font-size: 18px;
        }

        .answer h3 {
            font-size: 16px;
        }

        .answer p {
            margin: 0 0 12px;
        }

        .answer p:last-child,
        .answer ul:last-child,
        .answer ol:last-child,
        .answer pre:last-child {
            margin-bottom: 0;
        }

        .answer ul, .answer ol {
            margin: 0 0 12px;
            padding-left: 22px;
        }

        .answer li {
            margin: 4px 0;
        }

        .answer strong {
            font-weight: 800;
        }

        .answer code {
            font-family: var(--mono);
            font-size: 0.92em;
            border: 1px solid var(--line);
            border-radius: 5px;
            background: var(--surface-2);
            padding: 1px 4px;
        }

        .answer pre {
            margin: 0 0 12px;
            padding: 12px;
            overflow: auto;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fbfcfd;
        }

        .answer pre code {
            display: block;
            border: 0;
            border-radius: 0;
            background: transparent;
            padding: 0;
            white-space: pre;
        }

        .answer blockquote {
            margin: 0 0 12px;
            padding: 8px 12px;
            border-left: 3px solid var(--line-strong);
            color: var(--muted);
            background: #fbfcfd;
        }

        .answer a {
            color: var(--accent-2);
            text-decoration: none;
            border-bottom: 1px solid rgba(38, 95, 159, 0.35);
        }

        .answer hr {
            border: 0;
            border-top: 1px solid var(--line);
            margin: 14px 0;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .sources, .stats {
            display: none;
            border-top: 1px solid var(--line);
            padding: 12px 16px;
            color: var(--muted);
            font-size: 12px;
        }

        .sources.has-items, .stats.has-items {
            display: block;
        }

        .section-title {
            color: var(--ink);
            font-size: 12px;
            font-weight: 750;
            margin-bottom: 7px;
        }

        .source-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .source-pill {
            border: 1px solid var(--line);
            background: var(--surface-2);
            border-radius: 6px;
            padding: 4px 7px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--ink);
            text-decoration: none;
        }

        a.source-pill:hover {
            border-color: var(--accent-2);
            color: var(--accent-2);
        }

        .citation {
            color: var(--accent-2);
            font-weight: 650;
            text-decoration: none;
            border-bottom: 1px solid rgba(38, 95, 159, 0.35);
        }

        span.citation {
            border-bottom-style: dashed;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 8px;
        }

        .stat {
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 7px;
            background: #fbfcfd;
        }

        .stat-value {
            color: var(--ink);
            font-weight: 750;
        }

        .composer {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 30;
            background: linear-gradient(rgba(247,248,250,0), var(--bg) 30%);
            padding: 34px 20px 18px;
        }

        .composer-inner {
            max-width: 920px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid var(--line-strong);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            padding: 10px;
        }

        .composer textarea {
            width: 100%;
            min-height: 48px;
            max-height: 160px;
            resize: none;
            border: 0;
            outline: 0;
            padding: 11px 10px;
            color: var(--ink);
            background: transparent;
        }

        .send-col {
            display: flex;
            align-items: flex-end;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            padding: 0;
            font-size: 18px;
        }

        .modal {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
            place-items: center;
            padding: 20px;
            background: rgba(20, 23, 31, 0.36);
        }

        .modal.active {
            display: grid;
        }

        .dialog {
            width: min(720px, 100%);
            max-height: min(760px, calc(100vh - 40px));
            overflow: auto;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
        }

        .dialog-head {
            position: sticky;
            top: 0;
            background: var(--surface);
            border-bottom: 1px solid var(--line);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .dialog-title {
            font-weight: 800;
        }

        .dialog-body {
            padding: 16px;
            display: grid;
            gap: 14px;
        }

        .folder-list {
            display: grid;
            gap: 6px;
        }

        .folder-item {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 10px;
            background: #fbfcfd;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .folder-item:hover {
            border-color: var(--line-strong);
        }

        .form-row {
            display: grid;
            gap: 8px;
        }

        .label {
            color: var(--muted);
            font-size: 12px;
            font-weight: 750;
        }

        .text-editor {
            width: 100%;
            min-height: 190px;
            resize: vertical;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 10px;
            font-family: var(--mono);
            font-size: 12px;
            outline: 0;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .notice {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: #fbfcfd;
            padding: 10px;
            color: var(--muted);
            font-size: 13px;
        }

        .error-text {
            color: var(--danger);
        }

        @media (max-width: 820px) {
            .topbar-inner {
                grid-template-columns: 1fr;
                align-items: stretch;
            }

            .toolbar {
                justify-content: flex-start;
            }

            .main {
                padding: 18px 12px 150px;
            }

            .message {
                grid-template-columns: 28px minmax(0, 1fr);
                gap: 8px;
            }

            .avatar {
                width: 28px;
                height: 28px;
                border-radius: 7px;
                font-size: 10px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .composer {
                padding: 30px 12px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="topbar-inner">
                <div class="brand">
                    <div class="brand-mark">FS</div>
                    <div class="brand-text">
                        <div class="brand-title">FsExplorer</div>
                        <div class="brand-subtitle">Agentic document search</div>
                    </div>
                </div>

                <button class="folder-control" id="folderBtn" type="button">
                    <span>Folder</span>
                    <span class="folder-path" id="currentPath">.</span>
                </button>

                <div class="toolbar">
                    <span class="badge" id="indexBadge"><span class="dot" id="badgeDot"></span><span id="badgeText">Checking</span></span>
                    <div class="mode-group">
                        <label class="mode" id="smSemantic"><input type="checkbox" id="cbSemantic"> Semantic</label>
                    </div>
                    <button class="btn" id="indexBtn" type="button" title="Prepare the selected folder for faster semantic search">Prepare search</button>
                    <button class="btn subtle" id="newChatBtn" type="button">New chat</button>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="chat" id="chat">
                <section class="welcome" id="welcome">
                    <h1>Ask a question about your documents.</h1>
                    <p>The agent can scan folders, search indexed chunks, read source documents, and stream the final answer as it writes.</p>
                </section>
            </div>
        </main>

        <form class="composer" id="composer">
            <div class="composer-inner">
                <textarea id="queryInput" placeholder="Ask about the selected folder..." rows="1"></textarea>
                <div class="send-col">
                    <button class="btn primary send-btn" id="sendBtn" type="submit" title="Send">></button>
                </div>
            </div>
        </form>
    </div>

    <div class="modal" id="folderModal">
        <div class="dialog">
            <div class="dialog-head">
                <div>
                    <div class="dialog-title">Select folder</div>
                    <div class="folder-path" id="folderModalPath">.</div>
                </div>
                <div class="row">
                    <button class="btn" id="folderUpBtn" type="button">Up</button>
                    <button class="btn primary" id="selectFolderBtn" type="button">Use folder</button>
                    <button class="btn subtle" id="closeFolderBtn" type="button">Close</button>
                </div>
            </div>
            <div class="dialog-body">
                <div class="folder-list" id="folderList"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="indexModal">
        <div class="dialog">
            <div class="dialog-head">
                <div class="dialog-title" id="indexModalTitle">Prepare search</div>
                <button class="btn subtle" id="closeIndexBtn" type="button">Close</button>
            </div>
            <div class="dialog-body" id="indexModalBody"></div>
        </div>
    </div>

    <div class="modal" id="humanModal">
        <div class="dialog">
            <div class="dialog-head">
                <div class="dialog-title">Clarification needed</div>
            </div>
            <div class="dialog-body">
                <div class="notice" id="humanQuestion"></div>
                <textarea class="text-editor" id="humanInput" style="min-height:90px" placeholder="Type your answer..."></textarea>
                <div class="row">
                    <button class="btn primary" id="humanSubmitBtn" type="button">Continue</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentFolder = ".";
        let browsingPath = ".";
        let indexStatus = { indexed: false };
        let isRefreshingIndex = false;
        let ws = null;
        let isRunning = false;
        let messages = [];
        let activeAssistant = null;
        const LAST_FOLDER_KEY = "fsExplorer:lastFolder";

        const chat = document.getElementById("chat");
        const welcome = document.getElementById("welcome");
        const queryInput = document.getElementById("queryInput");
        const sendBtn = document.getElementById("sendBtn");
        const composer = document.getElementById("composer");
        const currentPathEl = document.getElementById("currentPath");
        const badgeDot = document.getElementById("badgeDot");
        const badgeText = document.getElementById("badgeText");
        const cbSemantic = document.getElementById("cbSemantic");
        const smSemantic = document.getElementById("smSemantic");
        const folderModal = document.getElementById("folderModal");
        const folderList = document.getElementById("folderList");
        const folderModalPath = document.getElementById("folderModalPath");
        const folderUpBtn = document.getElementById("folderUpBtn");
        const indexModal = document.getElementById("indexModal");
        const indexModalBody = document.getElementById("indexModalBody");
        const humanModal = document.getElementById("humanModal");

        document.getElementById("folderBtn").addEventListener("click", openFolderPicker);
        document.getElementById("closeFolderBtn").addEventListener("click", () => folderModal.classList.remove("active"));
        document.getElementById("folderUpBtn").addEventListener("click", navigateUp);
        document.getElementById("selectFolderBtn").addEventListener("click", selectCurrentFolder);
        document.getElementById("indexBtn").addEventListener("click", openIndexModal);
        document.getElementById("closeIndexBtn").addEventListener("click", () => indexModal.classList.remove("active"));
        document.getElementById("newChatBtn").addEventListener("click", newChat);
        document.getElementById("humanSubmitBtn").addEventListener("click", submitHumanResponse);

        composer.addEventListener("submit", (event) => {
            event.preventDefault();
            startExploration();
        });

        queryInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                startExploration();
            }
        });

        queryInput.addEventListener("input", () => {
            queryInput.style.height = "auto";
            queryInput.style.height = Math.min(queryInput.scrollHeight, 160) + "px";
        });

        function esc(value) {
            const div = document.createElement("div");
            div.textContent = value == null ? "" : String(value);
            return div.innerHTML;
        }

        function renderInlineMarkdown(text, sourceLinks = {}) {
            let html = esc(text);
            html = html.replace(
                /\[Source:\s*([^,\]]+)([^\]]*)\]/g,
                (match, source, rest) => {
                    const label = source.trim();
                    const href = sourceLinks[label];
                    const copy = `[Source: ${label}${rest}]`;
                    if (!href) return `<span class="citation">${esc(copy)}</span>`;
                    return `<a class="citation" href="${esc(href)}" target="_blank" rel="noopener noreferrer">${esc(copy)}</a>`;
                }
            );
            html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
            html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
            html = html.replace(/__([^_]+)__/g, "<strong>$1</strong>");
            html = html.replace(/\*([^*\n]+)\*/g, "<em>$1</em>");
            html = html.replace(/_([^_\n]+)_/g, "<em>$1</em>");
            html = html.replace(
                /\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g,
                '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>'
            );
            return html;
        }

        function renderMarkdown(markdown, sourceLinks = {}) {
            const text = String(markdown || "").replace(/\r\n/g, "\n").trim();
            if (!text) return "";

            const lines = text.split("\n");
            const html = [];
            let paragraph = [];
            let listType = null;
            let inCode = false;
            let codeLines = [];

            function flushParagraph() {
                if (!paragraph.length) return;
                html.push(`<p>${renderInlineMarkdown(paragraph.join(" "), sourceLinks)}</p>`);
                paragraph = [];
            }

            function closeList() {
                if (!listType) return;
                html.push(`</${listType}>`);
                listType = null;
            }

            for (const line of lines) {
                const trimmed = line.trim();

                if (trimmed.startsWith("```")) {
                    if (inCode) {
                        html.push(`<pre><code>${esc(codeLines.join("\n"))}</code></pre>`);
                        codeLines = [];
                        inCode = false;
                    } else {
                        flushParagraph();
                        closeList();
                        inCode = true;
                    }
                    continue;
                }

                if (inCode) {
                    codeLines.push(line);
                    continue;
                }

                if (!trimmed) {
                    flushParagraph();
                    closeList();
                    continue;
                }

                const heading = trimmed.match(/^(#{1,3})\s+(.+)$/);
                if (heading) {
                    flushParagraph();
                    closeList();
                    const level = heading[1].length;
                    html.push(`<h${level}>${renderInlineMarkdown(heading[2], sourceLinks)}</h${level}>`);
                    continue;
                }

                if (/^[-*_]{3,}$/.test(trimmed)) {
                    flushParagraph();
                    closeList();
                    html.push("<hr>");
                    continue;
                }

                const quote = trimmed.match(/^>\s?(.*)$/);
                if (quote) {
                    flushParagraph();
                    closeList();
                    html.push(`<blockquote>${renderInlineMarkdown(quote[1], sourceLinks)}</blockquote>`);
                    continue;
                }

                const bullet = trimmed.match(/^[-*]\s+(.+)$/);
                const ordered = trimmed.match(/^\d+[.)]\s+(.+)$/);
                if (bullet || ordered) {
                    flushParagraph();
                    const nextType = bullet ? "ul" : "ol";
                    if (listType !== nextType) {
                        closeList();
                        listType = nextType;
                        html.push(`<${listType}>`);
                    }
                    html.push(`<li>${renderInlineMarkdown((bullet || ordered)[1], sourceLinks)}</li>`);
                    continue;
                }

                closeList();
                paragraph.push(trimmed);
            }

            if (inCode) {
                html.push(`<pre><code>${esc(codeLines.join("\n"))}</code></pre>`);
            }
            flushParagraph();
            closeList();

            return html.join("");
        }

        function scrollToBottom() {
            window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
        }

        function compactMemory() {
            return messages.slice(-8).map((message) => ({
                role: message.role,
                content: message.content.length > 1400 ? message.content.slice(0, 1400) + "..." : message.content,
            }));
        }

        function newChat() {
            if (ws) {
                ws.close();
                ws = null;
            }
            isRunning = false;
            messages = [];
            activeAssistant = null;
            sendBtn.disabled = false;
            queryInput.disabled = false;
            chat.innerHTML = "";
            chat.appendChild(welcome);
        }

        function addUserMessage(text) {
            welcome.remove();
            messages.push({ role: "user", content: text });
            const node = document.createElement("article");
            node.className = "message user";
            node.innerHTML = `
                <div class="avatar">YOU</div>
                <div class="bubble"><div class="bubble-body text">${esc(text)}</div></div>
            `;
            chat.appendChild(node);
            scrollToBottom();
        }

        function addAssistantMessage() {
            const node = document.createElement("article");
            node.className = "message assistant";
            node.innerHTML = `
                <div class="avatar">AI</div>
                <div class="bubble assistant-shell">
                    <div class="live-row">
                        <span class="spinner"></span>
                        <div class="live-copy">
                            <div class="live-label">Thinking</div>
                            <div class="live-detail">Starting</div>
                        </div>
                    </div>
                    <div class="activity"></div>
                    <div class="answer cursor"></div>
                    <div class="sources"></div>
                    <div class="stats"></div>
                </div>
            `;
            chat.appendChild(node);
            activeAssistant = {
                node,
                liveRow: node.querySelector(".live-row"),
                liveLabel: node.querySelector(".live-label"),
                liveDetail: node.querySelector(".live-detail"),
                activity: node.querySelector(".activity"),
                answer: node.querySelector(".answer"),
                sources: node.querySelector(".sources"),
                stats: node.querySelector(".stats"),
                text: "",
                sourceLinks: {},
            };
            scrollToBottom();
        }

        function setLiveStatus(label, detail) {
            if (!activeAssistant) return;
            activeAssistant.liveLabel.textContent = label || "Working";
            activeAssistant.liveDetail.textContent = detail || "";
        }

        function addActivity(data, kind) {
            if (!activeAssistant) return;
            const label = data.status_label || (kind === "nav" ? "Opening folder" : data.tool_name || "Step");
            const detail = data.status_detail || data.directory || "";
            const reason = data.reason || "";
            activeAssistant.activity.classList.add("has-items");
            const item = document.createElement("div");
            item.className = "activity-item";
            item.innerHTML = `
                <div class="activity-step">${esc(data.step || "")}</div>
                <div class="activity-main">
                    <div class="activity-title">${esc(label)}${detail ? " - " + esc(detail) : ""}</div>
                    <div class="activity-reason">${esc(reason)}</div>
                </div>
            `;
            activeAssistant.activity.appendChild(item);
            scrollToBottom();
        }

        function appendAnswer(text) {
            if (!activeAssistant) return;
            activeAssistant.text += text || "";
            activeAssistant.answer.innerHTML = renderMarkdown(activeAssistant.text, activeAssistant.sourceLinks);
            scrollToBottom();
        }

        function finishAnswer(finalText) {
            if (!activeAssistant) return;
            if (finalText && !activeAssistant.text.trim()) {
                activeAssistant.text = finalText;
            }
            activeAssistant.answer.innerHTML = renderMarkdown(activeAssistant.text, activeAssistant.sourceLinks);
            activeAssistant.answer.classList.remove("cursor");
            activeAssistant.liveRow.style.display = "none";
        }

        function showSources(citedSources, sourceLinks = {}) {
            if (!activeAssistant || !Array.isArray(citedSources) || citedSources.length === 0) return;
            activeAssistant.sourceLinks = sourceLinks || {};
            activeAssistant.answer.innerHTML = renderMarkdown(activeAssistant.text, activeAssistant.sourceLinks);
            activeAssistant.sources.classList.add("has-items");
            activeAssistant.sources.innerHTML = `
                <div class="section-title">Sources</div>
                <div class="source-list">${citedSources.map((source) => sourcePillHtml(source, activeAssistant.sourceLinks[source])).join("")}</div>
            `;
        }

        function sourcePillHtml(source, href) {
            if (!href) return `<span class="source-pill">${esc(source)}</span>`;
            return `<a class="source-pill" href="${esc(href)}" target="_blank" rel="noopener noreferrer">${esc(source)}</a>`;
        }

        function showStats(stats) {
            if (!activeAssistant || !stats) return;
            activeAssistant.stats.classList.add("has-items");
            activeAssistant.stats.innerHTML = `
                <div class="section-title">Run stats</div>
                <div class="stats-grid">
                    ${statHtml("Steps", stats.steps)}
                    ${statHtml("Scanned", stats.documents_scanned)}
                    ${statHtml("Parsed", stats.documents_parsed)}
                    ${statHtml("Calls", stats.api_calls)}
                    ${statHtml("Tokens", formatNum(stats.total_tokens))}
                    ${statHtml("Cost", "$" + Number(stats.estimated_cost || 0).toFixed(4))}
                </div>
            `;
        }

        function statHtml(label, value) {
            return `<div class="stat"><div class="stat-value">${esc(value)}</div><div>${esc(label)}</div></div>`;
        }

        function formatNum(n) {
            const value = Number(n || 0);
            if (value >= 1000000) return (value / 1000000).toFixed(1) + "M";
            if (value >= 1000) return (value / 1000).toFixed(1) + "K";
            return String(value);
        }

        function setRunning(running) {
            isRunning = running;
            sendBtn.disabled = running;
            queryInput.disabled = running;
            badgeDot.classList.toggle("busy", running);
        }

        async function startExploration() {
            const query = queryInput.value.trim();
            if (!query || isRunning) return;

            addUserMessage(query);
            addAssistantMessage();
            queryInput.value = "";
            queryInput.style.height = "auto";
            setRunning(true);

            const enableSemantic = cbSemantic.checked;
            const useIndex = Boolean(indexStatus && indexStatus.indexed && enableSemantic);
            const payload = {
                task: query,
                folder: currentFolder,
                use_index: useIndex,
                enable_semantic: enableSemantic,
                enable_metadata: false,
                conversation_context: compactMemory().slice(0, -1),
            };

            if (ws) ws.close();
            const protocol = window.location.protocol === "https:" ? "wss" : "ws";
            ws = new WebSocket(`${protocol}://${window.location.host}/ws/explore`);
            ws.onopen = () => ws.send(JSON.stringify(payload));
            ws.onmessage = (event) => handleMessage(JSON.parse(event.data));
            ws.onerror = () => showError("Connection failed. Is the server running?");
            ws.onclose = () => setRunning(false);
        }

        function handleMessage(message) {
            const data = message.data || {};
            if (message.type === "status") {
                setLiveStatus(data.label, data.detail);
            } else if (message.type === "tool_call") {
                addActivity(data, "tool");
            } else if (message.type === "go_deeper") {
                addActivity(data, "nav");
            } else if (message.type === "ask_human") {
                showHumanModal(data);
            } else if (message.type === "answer_start") {
                setLiveStatus("Writing answer", "");
            } else if (message.type === "answer_delta") {
                appendAnswer(data.text || "");
            } else if (message.type === "answer_done") {
                finishAnswer(data.final_result || "");
                showSources(data.cited_sources || [], data.cited_source_links || {});
            } else if (message.type === "complete") {
                if (data.error) {
                    showError(data.error);
                    return;
                }
                finishAnswer(data.final_result || "");
                showStats(data.stats);
                messages.push({ role: "assistant", content: activeAssistant ? activeAssistant.text : data.final_result || "" });
            } else if (message.type === "error") {
                showError(data.message || "Unknown error");
            }
        }

        function showError(message) {
            if (!activeAssistant) addAssistantMessage();
            setLiveStatus("Error", message);
            activeAssistant.answer.classList.remove("cursor");
            activeAssistant.answer.innerHTML = `<span class="error-text">${esc(message)}</span>`;
            setRunning(false);
        }

        function showHumanModal(data) {
            document.getElementById("humanQuestion").textContent = data.question || "Please clarify.";
            document.getElementById("humanInput").value = "";
            humanModal.classList.add("active");
            setLiveStatus("Waiting for input", data.question || "");
        }

        function submitHumanResponse() {
            const response = document.getElementById("humanInput").value.trim();
            if (!response || !ws) return;
            humanModal.classList.remove("active");
            ws.send(JSON.stringify({ type: "human_response", response }));
            setLiveStatus("Thinking", "Continuing with your clarification");
        }

        async function checkIndexStatus(folder) {
            try {
                const response = await fetch(`/api/index/status?folder=${encodeURIComponent(folder)}`);
                indexStatus = await response.json();
            } catch (error) {
                indexStatus = { indexed: false };
            }
            updateIndexBadge();
            updateSearchModes();
            if (indexStatus && indexStatus.indexed && indexStatus.fresh === false) {
                refreshIndexInBackground();
            }
        }

        function updateIndexBadge() {
            if (isRefreshingIndex) {
                badgeDot.className = "dot busy";
                badgeText.textContent = "Refreshing search";
                return;
            }
            if (indexStatus && indexStatus.indexed) {
                badgeDot.className = "dot on";
                const stale = indexStatus.fresh === false ? ", updating" : "";
                badgeText.textContent = `Search ready (${indexStatus.document_count} docs${stale})`;
            } else {
                badgeDot.className = "dot";
                badgeText.textContent = "Live scan mode";
            }
        }

        function updateSearchModes() {
            const enabled = Boolean(indexStatus && indexStatus.indexed);
            smSemantic.classList.toggle("disabled", !enabled);
            cbSemantic.disabled = !enabled;
            if (!enabled) cbSemantic.checked = false;
        }

        async function openFolderPicker() {
            browsingPath = currentFolder;
            folderModal.classList.add("active");
            await loadFolders(browsingPath);
        }

        async function loadFolders(path) {
            folderList.innerHTML = `<div class="notice">Loading folders...</div>`;
            try {
                const response = await fetch(`/api/folders?path=${encodeURIComponent(path)}`);
                const data = await response.json();
                if (data.error) {
                    folderList.innerHTML = `<div class="notice error-text">${esc(data.error)}</div>`;
                    return;
                }
                browsingPath = data.current;
                folderModalPath.textContent = data.current;
                folderUpBtn.disabled = !data.parent;
                const folders = data.folders || [];
                folderList.innerHTML = folders.map((name) => `
                    <button class="folder-item" type="button" data-folder="${esc(name)}">
                        <span>${esc(name)}</span><span>Open</span>
                    </button>
                `).join("") || `<div class="notice">No subfolders. ${esc(data.files_count)} file(s) here.</div>`;
                folderList.querySelectorAll("[data-folder]").forEach((button) => {
                    button.addEventListener("click", () => loadFolders(browsingPath === "." ? button.dataset.folder : `${browsingPath}/${button.dataset.folder}`));
                });
            } catch (error) {
                folderList.innerHTML = `<div class="notice error-text">${esc(error.message)}</div>`;
            }
        }

        async function navigateUp() {
            const response = await fetch(`/api/folders?path=${encodeURIComponent(browsingPath)}`);
            const data = await response.json();
            if (data.parent) await loadFolders(data.parent);
        }

        function selectCurrentFolder() {
            currentFolder = browsingPath;
            currentPathEl.textContent = currentFolder;
            localStorage.setItem(LAST_FOLDER_KEY, currentFolder);
            folderModal.classList.remove("active");
            checkIndexStatus(currentFolder);
        }

        async function refreshIndexInBackground() {
            if (isRefreshingIndex) return;
            isRefreshingIndex = true;
            updateIndexBadge();
            try {
                const response = await fetch("/api/index", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        folder: currentFolder,
                        discover_schema: false,
                        with_metadata: false,
                        metadata_profile: null,
                        with_embeddings: false,
                    }),
                });
                const data = await response.json();
                if (!response.ok || data.error) throw new Error(data.error || `Index refresh failed (${response.status})`);
                indexStatus = {
                    ...indexStatus,
                    indexed: true,
                    fresh: true,
                    document_count: data.active_documents,
                };
            } catch (error) {
                console.warn("Index refresh failed", error);
            } finally {
                isRefreshingIndex = false;
                updateIndexBadge();
                updateSearchModes();
            }
        }

        function openIndexModal() {
            indexModal.classList.add("active");
            const statusText = indexStatus && indexStatus.indexed
                ? `Fast search is ready for ${indexStatus.document_count} document(s).`
                : "Fast semantic search has not been prepared for this folder yet. You can still chat without this; the agent will scan files live.";
            indexModalBody.innerHTML = `
                <div class="notice">${esc(statusText)}</div>
                <div class="notice">
                    Preparing search reads the selected folder once and stores searchable document chunks in a shared Postgres database. It is optional, but it makes Semantic mode available for faster follow-up questions.
                </div>
                <label class="row"><input type="checkbox" id="embedToggle"> Generate embeddings</label>
                <div class="notice">
                    Embeddings can improve semantic search, but they may take longer on large folders because each chunk is sent to the embedding API.
                </div>
                <div class="row">
                    <button class="btn primary" type="button" id="startIndexBtn">Prepare this folder</button>
                </div>
                <div id="indexResult"></div>
            `;
            document.getElementById("startIndexBtn").addEventListener("click", startIndexing);
        }

        async function startIndexing() {
            const result = document.getElementById("indexResult");

            result.innerHTML = `<div class="notice">Preparing searchable document chunks...</div>`;
            try {
                const response = await fetch("/api/index", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        folder: currentFolder,
                        discover_schema: false,
                        with_metadata: false,
                        metadata_profile: null,
                        with_embeddings: document.getElementById("embedToggle").checked,
                    }),
                });
                const data = await response.json();
                if (!response.ok || data.error) throw new Error(data.error || `Indexing failed (${response.status})`);
                await checkIndexStatus(currentFolder);
                result.innerHTML = `
                    <div class="notice">
                        Search prepared for ${esc(data.indexed_files)} file(s), wrote ${esc(data.chunks_written)} chunk(s), skipped ${esc(data.skipped_files)}.
                    </div>
                `;
            } catch (error) {
                result.innerHTML = `<div class="notice error-text">${esc(error.message)}</div>`;
            }
        }

        async function init() {
            const savedFolder = localStorage.getItem(LAST_FOLDER_KEY);
            if (savedFolder) {
                currentFolder = savedFolder;
                currentPathEl.textContent = savedFolder;
                await checkIndexStatus(currentFolder);
                return;
            }
            try {
                const response = await fetch("/api/folders?path=.");
                const data = await response.json();
                if (data.current) {
                    currentFolder = data.current;
                    currentPathEl.textContent = currentFolder;
                }
            } catch (error) {
                currentPathEl.textContent = ".";
            }
            await checkIndexStatus(currentFolder);
        }

        init();
    </script>
</body>
</html>
